global:
  timezone: "Asia/Shanghai"
  github_user_name: "hdj020402"
  github_user_email: "hudejun2002@gmail.com"

claude:
  haiku_model: "claude-haiku-4-5-20251001"
  opus_model: "claude-opus-4-6"
  max_tokens_haiku: 8192
  max_tokens_opus: 8192

email_extraction:
  sender_patterns:
    - "acs.pubs@acs.org"
    - "alerts@springer.com"
    - "noreply@rsc.org"
    - "toc-alerts@elsevier.com"
    - "noreply@wiley.com"
    - "alerts@nature.com"
    - "updates@acspubs.org"
  subject_patterns:
    - "Table of Contents"
    - "New Articles"
    - "Just Accepted"
    - "ASAP Articles"
  processing:
    translate_to_chinese: true
    generate_tags: true
    generate_relevance_score: true
    fetch_web_abstract: true
    web_fetch_timeout_seconds: 10
    lookback_days: 8
    # Keyword pre-filter: only process articles whose title or abstract
    # matches at least one keyword (case-insensitive).
    # Set to empty list [] to disable filtering (process all articles).
    relevance_keywords:
      # AI / Machine Learning
      - "machine learning"
      - "deep learning"
      - "neural network"
      - "graph neural"
      - "transformer"
      - "attention mechanism"
      - "reinforcement learning"
      - "generative model"
      - "diffusion model"
      - "large language model"
      - "foundation model"
      - "self-supervised"
      - "contrastive learning"
      - "active learning"
      - "transfer learning"
      - "few-shot"
      - "pre-train"
      - "fine-tun"
      - "artificial intelligence"
      - "AI-driven"
      - "AI-assisted"
      - "data-driven"
      # Computational Chemistry
      - "molecular dynamics"
      - "density functional"
      - "DFT"
      - "force field"
      - "molecular simulation"
      - "quantum chemistry"
      - "ab initio"
      - "first-principles"
      - "coarse-grain"
      - "free energy"
      - "enhanced sampling"
      - "metadynamics"
      # AI for Chemistry intersection
      - "molecular generation"
      - "molecular design"
      - "drug discovery"
      - "drug design"
      - "virtual screening"
      - "molecular property"
      - "property prediction"
      - "reaction prediction"
      - "retrosynthesis"
      - "synthesis planning"
      - "catalyst design"
      - "materials discovery"
      - "materials design"
      - "protein structure"
      - "protein folding"
      - "molecular representation"
      - "chemical space"
      - "SMILES"
      - "molecular fingerprint"
      - "cheminformatics"
      - "chemoinformatics"
      - "interatomic potential"
      - "machine learning potential"
      - "neural network potential"
      - "equivariant"
      - "message passing"
      - "graph convolution"
      - "variational autoencoder"
      - "generative adversarial"
      - "Bayesian optimization"
      - "surrogate model"
      - "high-throughput screening"
      - "inverse design"
      - "de novo design"
  output:
    notes_dir: "notes/daily"
    send_summary_email: true
    summary_email_to:
      - "hudejun2002@gmail.com"
      - "djhu24@m.fudan.edu.cn"

domain_deepdive:
  semantic_scholar:
    use_api_key: true
    initial_search_limit: 20
    min_citation_count: 10
    citation_traversal:
      max_levels: 2
      max_papers_per_level: 15
      max_expand_per_paper: 10
  output:
    notes_dir: "notes/deepdive"
    graph_dir: "output/graphs"
    download_open_access_pdf: true
    pdf_dir: "output/pdfs"
