name: Verify Secrets

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic google-auth google-auth-httplib2 google-api-python-client requests

      - name: Check secrets exist
        run: |
          echo "Checking if secrets are set..."
          [ -z "$ANTHROPIC_API_KEY" ] && echo "❌ ANTHROPIC_API_KEY is empty" || echo "✅ ANTHROPIC_API_KEY is set"
          [ -z "$GMAIL_CLIENT_ID" ] && echo "❌ GMAIL_CLIENT_ID is empty" || echo "✅ GMAIL_CLIENT_ID is set"
          [ -z "$GMAIL_CLIENT_SECRET" ] && echo "❌ GMAIL_CLIENT_SECRET is empty" || echo "✅ GMAIL_CLIENT_SECRET is set"
          [ -z "$GMAIL_REFRESH_TOKEN" ] && echo "❌ GMAIL_REFRESH_TOKEN is empty" || echo "✅ GMAIL_REFRESH_TOKEN is set"
          [ -z "$ANTHROPIC_BASE_URL" ] && echo "⚠️ ANTHROPIC_BASE_URL is empty (using default)" || echo "✅ ANTHROPIC_BASE_URL is set"
          [ -z "$SEMANTIC_SCHOLAR_API_KEY" ] && echo "⚠️ SEMANTIC_SCHOLAR_API_KEY is empty (optional)" || echo "✅ SEMANTIC_SCHOLAR_API_KEY is set"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}

      - name: Verify Anthropic API Key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: |
          python3 -c "
          import os, anthropic
          kwargs = {'api_key': os.environ['ANTHROPIC_API_KEY']}
          base_url = os.environ.get('ANTHROPIC_BASE_URL', '').strip()
          if base_url:
              kwargs['base_url'] = base_url
              # Print domain only (safe, no secret leakage)
              from urllib.parse import urlparse
              parsed = urlparse(base_url)
              print(f'Using base_url: {parsed.scheme}://{parsed.hostname}... (len={len(base_url)})')
          else:
              print('Using default Anthropic API URL')
          key = os.environ['ANTHROPIC_API_KEY'].strip()
          print(f'API key length: {len(key)}, starts with: {key[:8]}...')
          kwargs['api_key'] = key
          client = anthropic.Anthropic(**kwargs)
          resp = client.messages.create(
              model='claude-haiku-4-5-20251001',
              max_tokens=16,
              messages=[{'role': 'user', 'content': 'Reply with only: OK'}],
          )
          print('✅ Anthropic API: ' + resp.content[0].text)
          "

      - name: Verify Gmail OAuth2
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          python3 -c "
          import os
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request

          creds = Credentials(
              token=None,
              refresh_token=os.environ['GMAIL_REFRESH_TOKEN'],
              client_id=os.environ['GMAIL_CLIENT_ID'],
              client_secret=os.environ['GMAIL_CLIENT_SECRET'],
              token_uri='https://oauth2.googleapis.com/token',
              scopes=['https://www.googleapis.com/auth/gmail.modify'],
          )
          creds.refresh(Request())
          print('✅ Gmail OAuth2: token refreshed, valid=' + str(creds.valid))
          "

      - name: Verify Semantic Scholar API Key (optional)
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          python3 -c "
          import os, requests
          key = os.environ.get('SEMANTIC_SCHOLAR_API_KEY', '')
          if not key:
              print('⚠️ Semantic Scholar: no key set (will use unauthenticated access)')
          else:
              resp = requests.get(
                  'https://api.semanticscholar.org/graph/v1/paper/search',
                  params={'query': 'test', 'limit': 1},
                  headers={'x-api-key': key},
                  timeout=10,
              )
              if resp.status_code == 200:
                  print('✅ Semantic Scholar API: authenticated')
              elif resp.status_code == 403:
                  print('❌ Semantic Scholar API: key invalid (403)')
              else:
                  print(f'⚠️ Semantic Scholar API: status {resp.status_code}')
          "
